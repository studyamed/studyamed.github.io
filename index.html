<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Amed - Social Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ============================================
           NRT Font & Base Styles
           ============================================ */
        @font-face {
            font-family: 'NRT';
            src: url('https://cdn.jsdelivr.net/gh/nawafalqari/nrt-font/NRT-Reg.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/nawafalqari/nrt-font/NRT-Reg.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            font-family: 'NRT', 'Noto Sans Arabic', 'Tahoma', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* ============================================
           Kurdistan Flag Image Style
           ============================================ */
        .kurdistan-flag {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .kurdistan-flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ============================================
           Language Switcher Dropdown
           ============================================ */
        .lang-switcher {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 10;
        }

        .lang-switcher-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @media (prefers-color-scheme: dark) {
            .lang-switcher-btn {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(255, 255, 255, 0.1);
                color: #d1d5db;
            }
            .lang-switcher-btn:hover {
                background: rgba(255, 255, 255, 0.1);
            }
        }

        @media (prefers-color-scheme: light) {
            .lang-switcher-btn {
                background: rgba(0, 0, 0, 0.05);
                border-color: rgba(0, 0, 0, 0.1);
                color: #4b5563;
            }
            .lang-switcher-btn:hover {
                background: rgba(0, 0, 0, 0.1);
            }
        }

        .lang-switcher-btn svg {
            width: 16px;
            height: 16px;
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            min-width: 200px;
            padding: 0.5rem;
            border-radius: 1rem;
            border: 1px solid;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 20;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .lang-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        @media (prefers-color-scheme: dark) {
            .lang-dropdown {
                background: rgba(17, 17, 24, 0.95);
                border-color: rgba(255, 255, 255, 0.1);
            }
        }

        @media (prefers-color-scheme: light) {
            .lang-dropdown {
                background: rgba(255, 255, 255, 0.95);
                border-color: rgba(0, 0, 0, 0.1);
            }
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: right;
        }

        @media (prefers-color-scheme: dark) {
            .lang-option {
                color: #d1d5db;
            }
            .lang-option:hover {
                background: rgba(255, 255, 255, 0.05);
            }
            .lang-option.active {
                background: rgba(59, 130, 246, 0.2);
            }
        }

        @media (prefers-color-scheme: light) {
            .lang-option {
                color: #374151;
            }
            .lang-option:hover {
                background: rgba(0, 0, 0, 0.05);
            }
            .lang-option.active {
                background: rgba(59, 130, 246, 0.1);
            }
        }

        .lang-option-content {
            flex: 1;
        }

        .lang-option-name {
            font-weight: 600;
            font-size: 0.875rem;
            display: block;
        }

        .lang-option-native {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .lang-option-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3b82f6;
            color: white;
        }

        .lang-option:not(.active) .lang-option-check {
            display: none;
        }

        /* ============================================
           Dark/Light Mode - Auto System Only
           ============================================ */
        @media (prefers-color-scheme: dark) {
            body {
                background: #0a0a0f;
            }
            .card {
                background: rgba(17, 17, 24, 0.8);
                border-color: rgba(255, 255, 255, 0.08);
            }
            .name { color: #ffffff; }
            .bio { color: #9ca3af; }
            .btn {
                background: rgba(255, 255, 255, 0.05);
                color: #d1d5db;
                border-color: rgba(255, 255, 255, 0.1);
            }
            .btn:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #ffffff;
            }
            .social-link.tiktok {
                background: linear-gradient(90deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.2));
                border-color: rgba(0, 0, 0, 0.4);
            }
            .social-link.tiktok:hover {
                border-color: rgba(0, 0, 0, 0.6);
            }
            .social-link.telegram {
                background: linear-gradient(90deg, rgba(0, 136, 204, 0.2), rgba(0, 136, 204, 0.1));
                border-color: rgba(0, 136, 204, 0.3);
            }
            .social-link.telegram:hover {
                border-color: rgba(0, 136, 204, 0.5);
            }
            .social-name.tiktok { color: #ffffff; }
            .social-name.telegram { color: #22d3ee; }
            .social-desc { color: #6b7280; }
            .social-arrow { color: #6b7280; }
            .app-card {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(255, 255, 255, 0.1);
            }
            .app-card:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.2);
            }
            .app-name { color: #d1d5db; }
            .apps-title { color: #9ca3af; }
            .apps-section { border-color: rgba(255, 255, 255, 0.05); }
            .footer-text { color: #4b5563; }
            .orb-1 { background: rgba(37, 99, 235, 0.08); }
            .orb-2 { background: rgba(147, 51, 234, 0.08); }
            .orb-3 { background: rgba(6, 182, 212, 0.05); }
            .profile-glow { background: rgba(59, 130, 246, 0.2); }
            .online-status { border-color: #111118; }
            .profile-image { box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05); }
            .card-glow {
                background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(147, 51, 234, 0.2), rgba(6, 182, 212, 0.2));
            }
            .footer { border-color: rgba(255, 255, 255, 0.05); }
            .toast {
                background: rgba(17, 17, 24, 0.95);
                color: #ffffff;
                border-color: rgba(255, 255, 255, 0.1);
            }
        }

        @media (prefers-color-scheme: light) {
            body {
                background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ec 100%);
            }
            .card {
                background: rgba(255, 255, 255, 0.8);
                border-color: rgba(0, 0, 0, 0.05);
            }
            .name { color: #111827; }
            .bio { color: #6b7280; }
            .btn {
                background: rgba(0, 0, 0, 0.05);
                color: #4b5563;
                border-color: rgba(0, 0, 0, 0.05);
            }
            .btn:hover {
                background: rgba(0, 0, 0, 0.1);
                color: #111827;
            }
            .social-link.tiktok {
                background: linear-gradient(90deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.05));
                border-color: rgba(0, 0, 0, 0.2);
            }
            .social-link.tiktok:hover {
                border-color: rgba(0, 0, 0, 0.4);
            }
            .social-link.telegram {
                background: linear-gradient(90deg, rgba(0, 136, 204, 0.1), rgba(0, 136, 204, 0.05));
                border-color: rgba(0, 136, 204, 0.2);
            }
            .social-link.telegram:hover {
                border-color: rgba(0, 136, 204, 0.4);
            }
            .social-name.tiktok { color: #000000; }
            .social-name.telegram { color: #0891b2; }
            .social-desc { color: #9ca3af; }
            .social-arrow { color: #9ca3af; }
            .app-card {
                background: rgba(0, 0, 0, 0.05);
                border-color: rgba(0, 0, 0, 0.05);
            }
            .app-card:hover {
                background: rgba(0, 0, 0, 0.1);
                border-color: rgba(0, 0, 0, 0.1);
            }
            .app-name { color: #374151; }
            .apps-title { color: #6b7280; }
            .apps-section { border-color: rgba(0, 0, 0, 0.05); }
            .footer-text { color: #9ca3af; }
            .orb-1 { background: rgba(37, 99, 235, 0.15); }
            .orb-2 { background: rgba(147, 51, 234, 0.15); }
            .orb-3 { background: rgba(6, 182, 212, 0.1); }
            .profile-glow { background: rgba(59, 130, 246, 0.3); }
            .online-status { border-color: #ffffff; }
            .profile-image { box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05); }
            .card-glow {
                background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(147, 51, 234, 0.15), rgba(6, 182, 212, 0.15));
            }
            .footer { border-color: rgba(0, 0, 0, 0.05); }
            .toast {
                background: rgba(255, 255, 255, 0.95);
                color: #111827;
                border-color: rgba(0, 0, 0, 0.1);
            }
        }

        /* ============================================
           Animated Background Orbs
           ============================================ */
        .bg-orbs {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-scale 12s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(30px, -30px);
            }
            66% {
                transform: translate(-20px, 20px);
            }
        }

        @keyframes pulse-scale {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* ============================================
           Main Card Container
           ============================================ */
        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            z-index: 10;
            animation: slide-up 0.8s ease-out;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-glow {
            position: absolute;
            inset: -4px;
            border-radius: 2.5rem;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        .card {
            position: relative;
            border-radius: 2rem;
            overflow: hidden;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid;
            transition: all 0.5s ease;
        }

        /* ============================================
           Profile Section
           ============================================ */
        .profile-section {
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
        }

        .profile-image-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.25rem;
        }

        .profile-glow {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            filter: blur(12px);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }

        .profile-image {
            position: relative;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-status {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .online-ping {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #4ade80;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* ============================================
           Typography
           ============================================ */
        .name {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
            transition: color 0.5s ease;
        }

        .bio {
            font-size: 0.875rem;
            line-height: 1.625;
            margin-bottom: 1.5rem;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
            transition: color 0.5s ease;
        }

        /* ============================================
           Action Buttons
           ============================================ */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-icon {
            width: 16px;
            height: 16px;
        }

        .btn-icon.success {
            color: #22c55e;
        }

        /* ============================================
           Social Links
           ============================================ */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid;
        }

        .social-link:hover {
            transform: scale(1.02);
        }

        .social-icon {
            width: 44px;
            height: 44px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .social-link:hover .social-icon {
            transform: scale(1.1);
        }

        .social-icon.tiktok {
            background: #000000;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .social-icon.telegram {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
        }

        .social-info {
            flex: 1;
            text-align: right;
        }

        .social-name {
            font-size: 1.125rem;
            font-weight: 600;
            display: block;
            transition: color 0.5s ease;
        }

        .social-desc {
            font-size: 0.75rem;
            transition: color 0.5s ease;
        }

        .social-arrow {
            width: 20px;
            height: 20px;
            transition: color 0.3s ease;
        }

        .social-link.tiktok:hover .social-arrow {
            color: #000000;
        }

        .social-link.telegram:hover .social-arrow {
            color: #22d3ee;
        }

        /* ============================================
           Apps Section
           ============================================ */
        .apps-section {
            padding-top: 1.5rem;
            border-top: 1px solid;
            transition: border-color 0.5s ease;
        }

        .apps-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .apps-header svg {
            width: 16px;
            height: 16px;
            transition: color 0.5s ease;
        }

        .apps-title {
            font-size: 0.875rem;
            transition: color 0.5s ease;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid;
        }

        .app-card:hover {
            transform: scale(1.05);
        }

        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .app-card:hover .app-icon {
            transform: scale(1.1);
        }

        .app-icon.app-1 {
            background: linear-gradient(135deg, #25d366, #128c7e);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .app-icon.app-2 {
            background: linear-gradient(135deg, #0088cc, #00a8e8);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }

        .app-icon svg {
            width: 20px;
            height: 20px;
        }

        .app-name {
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.5s ease;
        }

        /* ============================================
           Footer
           ============================================ */
        .footer {
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid;
            text-align: center;
            transition: border-color 0.5s ease;
        }

        .footer-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            transition: color 0.5s ease;
        }

        .heart {
            width: 12px;
            height: 12px;
            color: #ef4444;
            fill: #ef4444;
        }

        /* ============================================
           Toast Notification - Simple & Beautiful
           ============================================ */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 0.875rem 1.75rem;
            border-radius: 0.75rem;
            font-size: 0.9375rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (prefers-color-scheme: dark) {
            .toast {
                background: #1f1f2e;
                color: #ffffff;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            }
        }

        @media (prefers-color-scheme: light) {
            .toast {
                background: #ffffff;
                color: #1f1f2e;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            }
        }

        /* ============================================
           Responsive
           ============================================ */
        @media (max-width: 480px) {
            .card-wrapper {
                max-width: 100%;
            }
            
            .profile-section {
                padding: 2rem 1.5rem 1.25rem;
            }
            
            .name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main Card -->
    <div class="card-wrapper" id="mainCard">
        <div class="card-glow"></div>
        <div class="card">
            <!-- Language Switcher -->
            <div class="lang-switcher">
                <button class="lang-switcher-btn" onclick="toggleLangDropdown()">
                    <i data-lucide="languages"></i>
                    <span id="currentLangText">کوردی سۆرانی</span>
                    <i data-lucide="chevron-down" style="width: 14px; height: 14px;"></i>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-option active" onclick="selectLanguage('ckb')" data-lang="ckb">
                        <div class="kurdistan-flag">
                            <img src="Flag_of_Kurdistan.png">
                        </div>
                        <div class="lang-option-content">
                            <span class="lang-option-name">کوردی سۆرانی</span>
                        </div>
                        <div class="lang-option-check">
                            <i data-lucide="check" style="width: 12px; height: 12px;"></i>
                        </div>
                    </div>
                    <div class="lang-option" onclick="selectLanguage('kmr')" data-lang="kmr">
                        <div class="kurdistan-flag">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Flag_of_Kurdistan.svg/1200px-Flag_of_Kurdistan.svg.png" alt="Kurdistan Flag">
                        </div>
                        <div class="lang-option-content">
                            <span class="lang-option-name">کوردی بادینی</span>
                        </div>
                        <div class="lang-option-check">
                            <i data-lucide="check" style="width: 12px; height: 12px;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="profile-section">
                <!-- Profile Image -->
                <div class="profile-image-wrapper">
                    <div class="profile-glow"></div>
                    <div class="profile-image">
                        <img src="studyamedlogo.png" alt="Study Amed">
                    </div>
                    <div class="online-status">
                        <div class="online-ping"></div>
                    </div>
                </div>

                <!-- Name -->
                <h1 class="name">Study Amed</h1>

                <!-- Bio -->
                <p class="bio" id="bioText">بەخێربێیت بۆ وێبسایتەکەم!</p>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn" onclick="copyLink()">
                        <i data-lucide="copy" class="btn-icon copy-icon"></i>
                        <i data-lucide="check" class="btn-icon check-icon" style="display: none;"></i>
                        <span class="btn-text" id="copyText">کۆپی</span>
                    </button>
                    <button class="btn" onclick="sharePage()">
                        <i data-lucide="share-2" class="btn-icon"></i>
                        <span id="shareText">بڵاوکردنەوە</span>
                    </button>
                </div>

                <!-- Social Links -->
                <div class="social-links">
                    <!-- TikTok -->
                    <a href="https://www.tiktok.com/@studyamed" target="_blank" rel="noopener noreferrer" class="social-link tiktok">
                        <div class="social-icon tiktok">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
                        </div>
                        <div class="social-info">
                            <span class="social-name tiktok" id="tiktokText">تیک تۆک</span>
                            <span class="social-desc" id="tiktokDesc">فۆڵۆوم بکە لە تیک تۆک</span>
                        </div>
                        <i data-lucide="external-link" class="social-arrow"></i>
                    </a>

                    <!-- Telegram -->
                    <a href="https://t.me/studyamed" target="_blank" rel="noopener noreferrer" class="social-link telegram">
                        <div class="social-icon telegram">
                            <i data-lucide="send"></i>
                        </div>
                        <div class="social-info">
                            <span class="social-name telegram" id="telegramText">تێلەگرام</span>
                            <span class="social-desc" id="telegramDesc">فۆڵۆوم بکە لە تێلەگرام</span>
                        </div>
                        <i data-lucide="external-link" class="social-arrow"></i>
                    </a>
                </div>

                <!-- Apps Section -->
                <div class="apps-section">
                    <div class="apps-header">
                        <i data-lucide="smartphone"></i>
                        <span class="apps-title" id="appsTitle">ئەپەکانم</span>
                    </div>
                    <div class="apps-grid">
                        <!-- WhatsApp -->
                        <a href="https://wa.me/yourphonenumber" target="_blank" rel="noopener noreferrer" class="app-card">
                            <div class="app-icon app-1">
                                <i data-lucide="message-circle"></i>
                            </div>
                            <span class="app-name" id="whatsappText">واتس ئەپ</span>
                        </a>
                        <!-- Telegram App -->
                        <a href="https://t.me/studyamed" target="_blank" rel="noopener noreferrer" class="app-card">
                            <div class="app-icon app-2">
                                <i data-lucide="send"></i>
                            </div>
                            <span class="app-name" id="telegramAppText">تێلەگرام</span>
                        </a>

                <!-- Footer -->
                <div class="footer">
                    <p class="footer-text">
                        <span id="madeWith">StudyAmed©2026</span>
                        <i data-lucide="heart" class="heart"></i>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Translations
        const translations = {
            ckb: {
                bio: 'بەخێربێیت بۆ وێبسایتەکەم!',
                copy: 'کۆپی',
                copied: 'کۆپی کرا!',
                share: 'بڵاوکردنەوە',
                tiktok: 'تیک تۆک',
                tiktokDesc: 'فۆڵۆوم بکە لە تیک تۆک',
                telegram: 'تێلەگرام',
                telegramDesc: 'فۆڵۆوم بکە لە تێلەگرام',
                appsTitle: 'ئەپەکانم',
                whatsapp: 'واتس ئەپ',
                telegramApp: 'تێلەگرام',
                madeWith: 'StudyAmed©2026',
                shareMessage: 'سەیری ئەم پەیجە بکە: Study Amed',
                currentLang: 'کوردی سۆرانی'
            },
            kmr: {
                bio: 'خێرهاتی بۆ وێبسایتەکا من!',
                copy: 'کۆپی',
                copied: 'کۆپی کرایە!',
                share: 'بەلاڤکرن',
                tiktok: 'تیک تۆک',
                tiktokDesc: 'فۆڵۆو من بکە لە تیک تۆک',
                telegram: 'تێلەگرام',
                telegramDesc: 'فۆڵۆو من بکە لە تێلەگرام',
                madeWith: 'StudyAmed©2026',
                shareMessage: 'سەیری ئەم پەیجە بکە: Study Amed',
                currentLang: 'کوردی بادینی'
            }
        };

        let currentLang = localStorage.getItem('language') || 'ckb';

        // Apply saved language on load
        document.addEventListener('DOMContentLoaded', () => {
            updateLanguage(currentLang);
            updateActiveLangOption(currentLang);
        });

        // Toggle language dropdown
        function toggleLangDropdown() {
            const dropdown = document.getElementById('langDropdown');
            dropdown.classList.toggle('show');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            const switcher = document.querySelector('.lang-switcher');
            if (!switcher.contains(e.target)) {
                document.getElementById('langDropdown').classList.remove('show');
            }
        });

        // Select language
        function selectLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            updateLanguage(lang);
            updateActiveLangOption(lang);
            document.getElementById('langDropdown').classList.remove('show');
            showToast(translations[lang].currentLang + ' هەڵبژێردرا');
        }

        // Update active language option
        function updateActiveLangOption(lang) {
            document.querySelectorAll('.lang-option').forEach(option => {
                option.classList.remove('active');
                if (option.dataset.lang === lang) {
                    option.classList.add('active');
                }
            });
        }

        // Update page language
        // Update page language
function updateLanguage(lang) {
    const t = translations[lang];
    document.getElementById('bioText').textContent = t.bio;
    document.getElementById('copyText').textContent = t.copy;
    document.getElementById('shareText').textContent = t.share;
    document.getElementById('tiktokText').textContent = t.tiktok;
    document.getElementById('tiktokDesc').textContent = t.tiktokDesc;
    document.getElementById('telegramText').textContent = t.telegram;
    document.getElementById('telegramDesc').textContent = t.telegramDesc;

    // --- لێرە دایبنێ ---
    document.getElementById('appsTitle').textContent = t.appsTitle;
    document.getElementById('whatsappText').textContent = t.whatsapp;
    document.getElementById('telegramAppText').textContent = t.telegramApp;
    // -----------------

    document.getElementById('madeWith').textContent = t.madeWith;
    document.getElementById('currentLangText').textContent = t.currentLang;
}

        // Copy link functionality
        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const copyIcon = document.querySelector('.copy-icon');
                const checkIcon = document.querySelector('.check-icon');
                const copyText = document.getElementById('copyText');
                
                copyIcon.style.display = 'none';
                checkIcon.style.display = 'inline';
                checkIcon.classList.add('success');
                copyText.textContent = translations[currentLang].copied;
                
                showToast(translations[currentLang].copied);
                
                setTimeout(() => {
                    copyIcon.style.display = 'inline';
                    checkIcon.style.display = 'none';
                    copyText.textContent = translations[currentLang].copy;
                }, 2000);
            });
        }

        // Share page functionality
        async function sharePage() {
            const shareData = {
                title: 'Study Amed - Social Links',
                text: translations[currentLang].shareMessage,
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                copyLink();
            }
        }

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
